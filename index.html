<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgageajae</title>
    <meta name="robots" content="noindex, follow"> <script>
        // 사용자의 브라우저 언어 감지
        const userLang = navigator.language || navigator.userLanguage;
        
        // 언어가 'ko'로 시작하면 /kr/ 폴더로, 아니면 /en/ 폴더로 이동
        if (userLang.toLowerCase().startsWith('ko')) {
            window.location.replace('/kr/');
        } else {
            window.location.replace('/en/');
        }
    </script>
    <script>
    if (location.protocol !== 'https:') {
        location.replace(`https:${location.href.substring(location.protocol.length)}`);
    }
    </script>
</head>
<body style="background-color: #f0f3fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; color: #334da9;">
    <div>
        <p>Redirecting to your preferred language...</p>
        <p><a href="/kr/">한국어로 이동</a> | <a href="/en/">Go to English</a></p>
    </div>
</body>
</html>
